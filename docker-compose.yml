version: "3.8"

services:
  db:
    image: postgres:15
    container_name: codeforge-db
    environment:
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge_password
      POSTGRES_DB: codeforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: codeforge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
